<div class="fixed top-4 left-1/2 -translate-x-1/2 z-50 shadow-xl">
  <div
    class="transition-colors duration-1000 ease-in-out w-64 h-64 rounded-md flex flex-col text-gray-500"
    [style]="moodService.getDifficultyBgStyle(score.value)"
    [class.text-white]="!!score.value && score.valid"
    [class.bg-white]="!score.value || score.invalid"
  >
    <div class="text-gray-500 pl-4 pt-3 absolute" [class.text-white]="!!score.value && score.valid">
      {{ date | date: 'E, MMM d' | lowercase }}
    </div>
    @if ((!!score.value && score.valid) || (!score.value && notes.value)) {
      <ng-icon
        (click)="save()"
        class="right-3 top-2 absolute text-3xl cursor-pointer"
        name="heroCheck"
      ></ng-icon>
    } @else {
      <ng-icon
        (click)="close.emit()"
        class="right-3 top-2 absolute text-3xl cursor-pointer"
        name="heroXMark"
      ></ng-icon>
    }
    <div class="flex items-center">
      <input
        appAutofocus
        autocomplete="off"
        type="number"
        class="remove-arrow outline-none w-full text-center placeholder-gray-100 transition-all duration-500"
        placeholder="#"
        [formControl]="score"
        [ngClass]="{ 'py-16 text-8xl': !notes.value, 'py-14 text-5xl': notes.value }"
      />
    </div>

    <textarea
      class="outline-none resize-none w-full absolute bottom-0 px-4 h-9"
      autocomplete="off"
      placeholder="notes..."
      [formControl]="notes"
      [ngClass]="{ 'h-9': !notes.value, 'h-28': notes.value }"
      [class.placeholder-gray-300]="!score.value || score.invalid"
      [class.placeholder-white]="!!score.value && score.valid"
    ></textarea>
  </div>
</div>
